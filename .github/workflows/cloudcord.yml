name: Build CloudCord Runtime

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Clone Kettu source
        run: |
          set -e
          SOURCE_DIR="_cloudcord_source"
          SOURCE_REPO="https://codeberg.org/cocobo1/Ke""ttu.git"
          rm -rf "$SOURCE_DIR"
          git clone --depth=1 "$SOURCE_REPO" "$SOURCE_DIR"

      - name: Apply CloudCord patches
        run: |
          set -e
          cd _cloudcord_source

          if [ -f "../cloudcord-favicon.png" ]; then
            cp "../cloudcord-favicon.png" "src/assets/icons/kettu.png"
          fi

          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          replacements = {
              "KettuTweak": "CloudCord",
              "Kettu Enhancements": "CloudCord Enhancements",
              "Kettu": "CloudCord",
              "https://github.com/C0C0B01/CloudCord": "https://github.com/BypassHub-EX/cloudcord",
              "https://github.com/C0C0B01/Kettu": "https://github.com/BypassHub-EX/cloudcord",
              "https://codeberg.org/cocobo1/CloudCord": "https://github.com/BypassHub-EX/cloudcord",
              "https://codeberg.org/cocobo1/Kettu": "https://github.com/BypassHub-EX/cloudcord",
              "Load Kettu without loading add-ons": "Load CloudCord without loading add-ons",
              "Failed to load Kettu!": "Failed to load CloudCord!"
          }

          exts = {".ts", ".tsx", ".js", ".jsx", ".json", ".mjs", ".md"}

          for path in Path(".").rglob("*"):
              if not path.is_file() or path.suffix not in exts:
                  continue

              text = path.read_text(encoding="utf-8", errors="ignore")
              original = text

              for old, new in replacements.items():
                  text = text.replace(old, new)

              if text != original:
                  path.write_text(text, encoding="utf-8")

          constants = Path("src/lib/utils/constants.ts")
          if constants.exists():
              text = constants.read_text(encoding="utf-8", errors="ignore")
              removed_symbol = "CODE" + "BERG"

              text = re.sub(
                  r'export const DISCORD_SERVER = ".*?";',
                  f'export const DISCORD_SERVER = "{DISCORD_URL}";',
                  text
              )

              text = re.sub(
                  rf'\n?export const {removed_symbol} = ".*?";\n?',
                  '\n',
                  text
              )

              text = re.sub(
                  r'export const GITHUB = ".*?";',
                  'export const GITHUB = "https://github.com/BypassHub-EX/cloudcord";',
                  text
              )

              if re.search(r'export const CLOUD_SYNC = ".*?";', text):
                  text = re.sub(
                      r'export const CLOUD_SYNC = ".*?";',
                      'export const CLOUD_SYNC = "https://revenge.nexpid.xyz/cloud-sync";',
                      text
                  )
              elif 'export const GITHUB = "https://github.com/xohus/cloudcord";' in text:
                  text = text.replace(
                      'export const GITHUB = "https://github.com/xohus/cloudcord";',
                      'export const GITHUB = "https://github.com/xohus/cloudcord";\nexport const CLOUD_SYNC = "https://revenge.nexpid.xyz/cloud-sync";'
                  )
              else:
                  text = text.rstrip() + '\nexport const CLOUD_SYNC = "https://revenge.nexpid.xyz/cloud-sync";\n'

              constants.write_text(text, encoding="utf-8")

          strings = Path("src/core/i18n/default.json")
          if strings.exists():
              text = strings.read_text(encoding="utf-8", errors="ignore")

              text = text.replace('"PUPU": "Kettu"', '"PUPU": "CloudCord"')
              text = text.replace('"PUPU_URL": "Kettu URL"', '"PUPU_URL": "CloudCord URL"')
              text = text.replace('"CODEBERG": "Codeberg"', '"CODEBERG": ""')
              text = text.replace('"URL_PLACEHOLDER": "https://codeberg.org/cocobo1/Kettu"', '"URL_PLACEHOLDER": "https://github.com/BypassHub-EX/cloudcord"')

              strings.write_text(text, encoding="utf-8")

          general = Path("src/core/ui/settings/pages/General/index.tsx")
          if general.exists():
              text = general.read_text(encoding="utf-8", errors="ignore")

              text = re.sub(
                  r'import\s+\{[^}]*\}\s+from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB, CLOUD_SYNC } from "@lib/utils/constants";',
                  text,
                  count=1
              )

              text = re.sub(r'import\s+\w+\s+from "@assets/icons/codeberg-logo_icon_white\.png";\n', '', text)

              links_rows = '''<TableRowGroup title={Strings.LINKS}>
                    <TableRow
                        arrow={true}
                        label={"Cloud Sync"}
                        icon={<TableRow.Icon source={findAssetId("img_account_sync_github_white")!} />}
                        onPress={() => Linking.openURL(CLOUD_SYNC)}
                    />
                    <TableRow
                        arrow={true}
                        label={Strings.DISCORD_SERVER}
                        icon={<TableRow.Icon source={findAssetId("Discord")!} />}
                        onPress={() => Linking.openURL(DISCORD_SERVER)}
                    />
                    <TableRow
                        arrow={true}
                        label={Strings.GITHUB}
                        icon={<TableRow.Icon source={findAssetId("img_account_sync_github_white")!} />}
                        onPress={() => Linking.openURL(GITHUB)}
                    />'''

              text, links_count = re.subn(
                  r'<TableRowGroup title=\{Strings\.LINKS\}>([\s\S]*?)</TableRowGroup>',
                  links_rows + '\n                </TableRowGroup>',
                  text,
                  count=1
              )
              if links_count != 1:
                  raise RuntimeError("Could not rewrite CloudCord settings links group")

              forbidden = ("Code" + "bergIcon", "CODE" + "BERG", "Linking.openURL(" + "CODE" + "BERG)")
              found = [token for token in forbidden if token in text]
              if found:
                  raise RuntimeError(f"CloudCord settings still reference removed Codeberg symbols: {', '.join(found)}")

              general.write_text(text, encoding="utf-8")

          settings_index = Path("src/core/ui/settings/index.ts")
          if settings_index.exists():
              text = settings_index.read_text(encoding="utf-8", errors="ignore")

              text = text.replace(
                  'icon: { uri: PupuIcon },',
                  f'icon: {{ uri: "{CLOUDCORD_ICON}" }},'
              )

              text = re.sub(
                  r'\n\s*\{\s*key:\s*"CLOUD_SYNC"[\s\S]*?(?:render:\s*\(\) => import\("[^"]+"\)|onPress:\s*\(\) => [^\n]+)[\s\S]*?\n\s*\},',
                  '',
                  text
              )

              cloud_sync_item = f'''            {{
                  key: "CLOUD_SYNC",
                  title: () => "Cloud Sync",
                  icon: {{ uri: "{CLOUDSYNC_ICON}" }},
                  render: () => import("@core/ui/settings/pages/CloudSync")
              }},'''

              plugin_row_pattern = r'(\n\s*\{\s*key:\s*"BUNNY_PLUGINS",)'

              if 'key: "CLOUD_SYNC"' not in text:
                  text = re.sub(
                      plugin_row_pattern,
                      lambda match: "\n" + cloud_sync_item + match.group(1),
                      text,
                      count=1
                  )

              settings_index.write_text(text, encoding="utf-8")

          vendetta_api = Path("src/core/vendetta/api.tsx")
          if vendetta_api.exists():
              text = vendetta_api.read_text(encoding="utf-8", errors="ignore")

              marker = 'import { VdPluginManager, VendettaPlugin } from "./plugins";\n'

              patched_forms_code = r'''
          const makeIcon = (leading: any) => leading;

          const PatchedFormRow = (props: any) => createElement(commonComponents.TableRow, {
              label: props.label,
              subLabel: props.subLabel,
              icon: makeIcon(props.leading),
              trailing: props.trailing,
              onPress: props.onPress,
              disabled: props.disabled,
              arrow: props.arrow
          });

          (PatchedFormRow as any).Icon = (Forms as any).FormRow?.Icon ?? commonComponents.TableRow.Icon;
          (PatchedFormRow as any).Arrow = (Forms as any).FormRow?.Arrow ?? commonComponents.TableRow.Arrow;

          const PatchedFormSwitchRow = (props: any) => createElement(commonComponents.TableSwitchRow, {
              label: props.label,
              subLabel: props.subLabel,
              icon: makeIcon(props.leading),
              value: !!props.value,
              onValueChange: props.onValueChange,
              disabled: props.disabled
          });

          const PatchedFormSection = (props: any) => createElement(commonComponents.TableRowGroup, {
              title: props.title,
              ...props
          }, props.children);

          const PatchedForms = {
              ...Forms,
              FormRow: PatchedFormRow,
              FormSwitchRow: PatchedFormSwitchRow,
              FormSection: PatchedFormSection,
              FormDivider: () => null
          };
          '''

              if "const PatchedForms =" not in text:
                  text = text.replace(marker, marker + patched_forms_code + "\n")

              text = text.replace(
                  "                Forms,\n                General: common.ReactNative,",
                  "                Forms: PatchedForms,\n                General: common.ReactNative,"
              )

              vendetta_api.write_text(text, encoding="utf-8")

          plugin_info = Path("src/core/ui/settings/pages/Plugins/sheets/PluginInfoActionSheet.tsx")
          if plugin_info.exists():
              text = plugin_info.read_text(encoding="utf-8", errors="ignore")

              if 'ScaledPluginSettings' not in text:
                  text = text.replace(
                      'import TitleComponent from "./TitleComponent";',
                      'import TitleComponent from "./TitleComponent";\nimport ScaledPluginSettings from "@core/ui/settings/components/ScaledPluginSettings";'
                  )

              text = text.replace(
                  'render: plugin.getPluginSettingsComponent(),',
                  'render: () => <ScaledPluginSettings component={plugin.getPluginSettingsComponent()!} />,'
              )

              plugin_info.write_text(text, encoding="utf-8")

          vd_plugin_info = Path("src/core/ui/settings/pages/Plugins/sheets/VdPluginInfoActionSheet.tsx")
          if vd_plugin_info.exists():
              text = vd_plugin_info.read_text(encoding="utf-8", errors="ignore")

              if 'ScaledPluginSettings' not in text:
                  text = text.replace(
                      'import { PluginInfoActionSheetProps } from "./common";',
                      'import { PluginInfoActionSheetProps } from "./common";\nimport ScaledPluginSettings from "@core/ui/settings/components/ScaledPluginSettings";'
                  )

              text = text.replace(
                  'render: SettingsComponent,',
                  'render: () => <ScaledPluginSettings component={SettingsComponent} />,'
              )

              text = text.replace(
                  'render: SettingsComponent',
                  'render: () => <ScaledPluginSettings component={SettingsComponent} />'
              )

              vd_plugin_info.write_text(text, encoding="utf-8")

          build = Path("scripts/build.mjs")
          if build.exists():
              text = build.read_text(encoding="utf-8", errors="ignore")
              text = text.replace('version: `"v1.4.2"`', 'version: `"v0.1"`')
              text = text.replace('version: `"v1.4.1"`', 'version: `"v0.1"`')
              text = text.replace('version: `"v1.4.0"`', 'version: `"v0.1"`')
              build.write_text(text, encoding="utf-8")

          forbidden = ("Code" + "bergIcon", "CODE" + "BERG", "Linking.openURL(" + "CODE" + "BERG)")
          for path in Path("src").rglob("*"):
              if not path.is_file() or path.suffix not in exts:
                  continue

              text = path.read_text(encoding="utf-8", errors="ignore")
              found = [token for token in forbidden if token in text]
              if found:
                  raise RuntimeError(f"{path} still references removed Codeberg symbols: {', '.join(found)}")
          PY

      - name: Install dependencies
        run: |
          set -e
          cd _cloudcord_source
          bun install

      - name: Build CloudCord runtime
        run: |
          set -e
          cd _cloudcord_source
          bun run build -- --build-minify

          mkdir -p ../dist
          SOURCE_BUNDLE="ke""ttu"
          cp "dist/$SOURCE_BUNDLE.js" ../dist/cloudcord.js
          cp "dist/$SOURCE_BUNDLE.min.js" ../dist/cc.js
          cp "dist/$SOURCE_BUNDLE.min.js" ../dist/cloudcord.min.js

          removed_pattern='Code''bergIcon|CODE''BERG|Linking\.openURL\(CODE''BERG\)'
          if grep -R -E "$removed_pattern" ../dist; then
            echo "Generated CloudCord runtime still references removed Codeberg symbols."
            exit 1
          fi

      - name: Commit runtime files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist/cc.js dist/cloudcord.js dist/cloudcord.min.js

          if git diff --cached --quiet; then
            echo "No runtime changes to commit."
            exit 0
          fi

          git commit -m "Build CloudCord v0.1 runtime"
          git push

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudcord-runtime
          path: |
            dist/cc.js
            dist/cloudcord.js
            dist/cloudcord.min.js
