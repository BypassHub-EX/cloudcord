name: Build CloudCord Runtime

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download compiled Kettu runtime
        run: |
          curl -fL --retry 3 -o cc.js "https://codeberg.org/cocobo1/Kettu/raw/branch/dist/kettu.min.js"

      - name: Rebrand runtime to CloudCord
        run: |
          perl -0pi -e 's/KettuTweak/CloudCord/g; s/Kettu/CloudCord/g; s/kettu/cloudcord/g' cc.js
          cp cc.js cloudcord.js
          cp cc.js cloudcord.min.js

      - name: Commit runtime files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cc.js cloudcord.js cloudcord.min.js
          git commit -m "Build CloudCord runtime" || exit 0
          git push

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudcord-runtime
          path: |
            cc.js
            cloudcord.js
            cloudcord.min.js
