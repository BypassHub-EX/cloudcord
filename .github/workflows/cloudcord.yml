name: Build CloudCord Runtime

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Clone Kettu source
        run: |
          set -e
          rm -rf _kettu_build
          git clone --depth=1 https://codeberg.org/cocobo1/Kettu.git _kettu_build

      - name: Apply CloudCord branding
        run: |
          set -e
          cd _kettu_build

          if [ -f "../cloudcord-favicon.png" ]; then
            cp "../cloudcord-favicon.png" "src/assets/icons/kettu.png"
          fi

          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "KettuTweak": "CloudCord",
              "Kettu Enhancements": "CloudCord Enhancements",
              "Kettu": "CloudCord",
              "https://github.com/C0C0B01/CloudCord": "https://github.com/BypassHub-EX/cloudcord",
              "https://github.com/C0C0B01/Kettu": "https://github.com/BypassHub-EX/cloudcord",
              "https://codeberg.org/cocobo1/CloudCord": "https://github.com/BypassHub-EX/cloudcord",
              "https://codeberg.org/cocobo1/Kettu": "https://github.com/BypassHub-EX/cloudcord",
              "Load CloudCord without loading add-ons": "Load CloudCord without loading add-ons",
              "Load Kettu without loading add-ons": "Load CloudCord without loading add-ons",
              "Failed to load CloudCord!": "Failed to load CloudCord!",
              "Failed to load Kettu!": "Failed to load CloudCord!"
          }

          exts = {".ts", ".tsx", ".js", ".jsx", ".json", ".mjs", ".md"}
          for path in Path(".").rglob("*"):
              if not path.is_file() or path.suffix not in exts:
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              original = text
              for old, new in replacements.items():
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding="utf-8")

          constants = Path("src/lib/utils/constants.ts")
          if constants.exists():
              text = constants.read_text(encoding="utf-8", errors="ignore")
              text = text.replace('export const DISCORD_SERVER = "https://discord.gg/6cN7wKa8gp";', 'export const DISCORD_SERVER = "";')
              text = text.replace('export const CODEBERG = "https://codeberg.org/cocobo1/CloudCord";', 'export const CODEBERG = "";')
              text = text.replace('export const CODEBERG = "https://codeberg.org/cocobo1/Kettu";', 'export const CODEBERG = "";')
              text = text.replace('export const GITHUB = "https://github.com/C0C0B01/CloudCord";', 'export const GITHUB = "https://github.com/BypassHub-EX/cloudcord";')
              text = text.replace('export const GITHUB = "https://github.com/C0C0B01/Kettu";', 'export const GITHUB = "https://github.com/BypassHub-EX/cloudcord";')
              constants.write_text(text, encoding="utf-8")

          strings = Path("src/core/i18n/default.json")
          if strings.exists():
              text = strings.read_text(encoding="utf-8", errors="ignore")
              text = text.replace('"PUPU": "CloudCord"', '"PUPU": "CloudCord"')
              text = text.replace('"PUPU": "Kettu"', '"PUPU": "CloudCord"')
              text = text.replace('"PUPU_URL": "Kettu URL"', '"PUPU_URL": "CloudCord URL"')
              text = text.replace('"CODEBERG": "Codeberg"', '"CODEBERG": ""')
              text = text.replace('"DISCORD_SERVER": "Discord Server"', '"DISCORD_SERVER": ""')
              text = text.replace('"URL_PLACEHOLDER": "https://github.com/BypassHub-EX/cloudcord"', '"URL_PLACEHOLDER": "https://github.com/BypassHub-EX/cloudcord"')
              text = text.replace('"URL_PLACEHOLDER": "https://codeberg.org/cocobo1/Kettu"', '"URL_PLACEHOLDER": "https://github.com/BypassHub-EX/cloudcord"')
              strings.write_text(text, encoding="utf-8")

          general = Path("src/core/ui/settings/pages/General/index.tsx")
          if general.exists():
              text = general.read_text(encoding="utf-8", errors="ignore")
              text = text.replace('import { DISCORD_SERVER, GITHUB, CODEBERG } from "@lib/utils/constants";', 'import { GITHUB } from "@lib/utils/constants";')
              text = text.replace('import CodebergIcon from "@assets/icons/codeberg-logo_icon_white.png";\n', '')

              old = '''<TableRowGroup title={Strings.LINKS}>
                    <TableRow
                        arrow={true}
                        label={Strings.DISCORD_SERVER}
                        icon={<TableRow.Icon source={findAssetId("Discord")!} />}
                        onPress={() => Linking.openURL(DISCORD_SERVER)}
                    />
                    <TableRow
                        arrow={true}
                        label={Strings.CODEBERG}
                        icon={<TableRow.Icon source={{ uri: CodebergIcon}} />}
                        onPress={() => Linking.openURL(CODEBERG)}
                    />
                    <TableRow
                        arrow={true}
                        label={Strings.GITHUB}
                        icon={<TableRow.Icon source={findAssetId("img_account_sync_github_white")!} />}
                        onPress={() => Linking.openURL(GITHUB)}
                    />
                </TableRowGroup>'''

              new = '''<TableRowGroup title={Strings.LINKS}>
                    <TableRow
                        arrow={true}
                        label={Strings.GITHUB}
                        icon={<TableRow.Icon source={findAssetId("img_account_sync_github_white")!} />}
                        onPress={() => Linking.openURL(GITHUB)}
                    />
                </TableRowGroup>'''

              text = text.replace(old, new)
              general.write_text(text, encoding="utf-8")

          build = Path("scripts/build.mjs")
          if build.exists():
              text = build.read_text(encoding="utf-8", errors="ignore")
              text = text.replace('version: `"v1.4.2"`', 'version: `"v0.1"`')
              build.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          set -e
          cd _kettu_build
          bun install

      - name: Build CloudCord runtime
        run: |
          set -e
          cd _kettu_build
          bun run build -- --build-minify

          cp dist/kettu.js ../cloudcord.js
          cp dist/kettu.min.js ../cc.js
          cp dist/kettu.min.js ../cloudcord.min.js

      - name: Commit runtime files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cc.js cloudcord.js cloudcord.min.js
          git commit -m "Build CloudCord v0.1 runtime" || exit 0
          git push

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudcord-runtime
          path: |
            cc.js
            cloudcord.js
            cloudcord.min.js
